# =============================================================================
# NginxMart Demo — "Nginx and You" @ PHPTek 2026
# nginx config for demo.site
# =============================================================================
# Sections:
#   1. FastCGI Cache (http block)
#   2. Rate Limiting (http block)
#   3. Redirect Map (http block)
#   4. GeoIP2 (http block)
#   5. Split Testing (http block)
#   6. Server Block
#      a. Redirects
#      b. Caching
#      c. Rate Limiting
#      d. IP Access Control + Basic Auth
#      e. Auth Request (auth_request)
#      f. Geo Location
#      g. Split Testing
#      h. Request Mirroring
#      i. PHP-FPM (main location)
# =============================================================================


# ─── 1. FastCGI Cache ────────────────────────────────────────────────────────
# Place in http {} block (e.g. /etc/nginx/nginx.conf or a conf.d include)

fastcgi_cache_path /var/cache/nginx/fastcgi
    levels=1:2
    keys_zone=fastcgi_cache:10m
    max_size=1g
    inactive=60m
    use_temp_path=off;


# ─── 2. Rate Limiting ────────────────────────────────────────────────────────
# 2 requests/sec per IP; burst of 3 without delay

limit_req_zone $binary_remote_addr zone=search_limit:10m rate=2r/s;


# ─── 3. Redirect Map ─────────────────────────────────────────────────────────
# Maps old URIs to new ones — evaluated in the server block

map $request_uri $redirect_uri {
    /old-contact    /contact;
    /our-services   /services;
    /blog/old-post  /blog/new-post;
    /sale           /promotions;
}


# ─── 4. GeoIP2 ───────────────────────────────────────────────────────────────
# Requires ngx_http_geoip2_module and MaxMind GeoLite2 databases
# Download: https://dev.maxmind.com/geoip/geolite2-free-geolocation-data

geoip2 /etc/nginx/geoip/GeoLite2-Country.mmdb {
    $geoip2_country_code  country iso_code;
    $geoip2_country_name  country names en;
}

geoip2 /etc/nginx/geoip/GeoLite2-City.mmdb {
    $geoip2_city      city names en;
    $geoip2_region    subdivisions 0 iso_code;
    $geoip2_timezone  location time_zone;
}


# ─── 5. Split Testing ────────────────────────────────────────────────────────
# Deterministic per-IP variant assignment (20% v2, 25% v3, 55% control)

split_clients "$remote_addr" $ab_variant {
    20%  "checkout_v2";
    25%  "checkout_v3";
    *    "control";
}


# =============================================================================
# Server Block
# =============================================================================

server {
    listen 80;
    listen 443 ssl;
    server_name demo.site;
    root /var/www/phptek-demo/public;
    index index.php;

    # SSL — adjust paths to your actual certificate files
    ssl_certificate     /etc/ssl/certs/demo.site.crt;
    ssl_certificate_key /etc/ssl/private/demo.site.key;


    # ── a. Simple Redirect ────────────────────────────────────────────────────
    # Exact match — faster than a map for a single URL

    location = /about-us {
        return 301 /about;
    }


    # ── b. Rewrite ────────────────────────────────────────────────────────────
    # /product/1  →  /products/1  (permanent)

    rewrite ^/product/(\d+)$ /products/$1 permanent;


    # ── c. Map-based Redirects ────────────────────────────────────────────────
    # Evaluated for every request; only fires when $redirect_uri is set.
    # The map is defined above in the http {} block.

    if ($redirect_uri) {
        return 301 $redirect_uri;
    }


    # ── d. Rate Limiting — /search ────────────────────────────────────────────
    # 2 req/s, burst 3. Returns 429 once burst is exhausted.

    location /search {
        limit_req zone=search_limit burst=3 nodelay;
        limit_req_status 429;

        try_files $uri $uri/ /index.php?$query_string;
    }


    # ── e. IP Access Control + Basic Auth — /admin ───────────────────────────
    # Two approaches shown — uncomment the one you want to demo.

    location /admin {

        # --- Option 1: IP allowlist ---
        # allow 203.0.113.42;   # your demo machine's IP
        # deny all;

        # --- Option 2: Basic Auth ---
        # Generate .htpasswd:  htpasswd -c /etc/nginx/.htpasswd admin
        auth_basic           "NginxMart Admin";
        auth_basic_user_file /etc/nginx/.htpasswd;

        try_files $uri $uri/ /index.php?$query_string;
    }


    # ── f. Auth Request — /private ───────────────────────────────────────────
    # nginx calls /auth before forwarding to Laravel.
    # Laravel returns 200 (pass) or 401 (block) based on X-Auth-Token header.
    # Demo: curl -H "X-Auth-Token: secret" https://demo.site/private

    location /private {
        auth_request /auth;
        auth_request_set $auth_status $upstream_status;
        error_page 401 = @unauthorized;

        try_files $uri $uri/ /index.php?$query_string;
    }

    # Internal subrequest target — never reachable directly by clients
    location = /auth {
        internal;

        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param REQUEST_URI     /auth;
        include fastcgi_params;

        # Forward the original token so Laravel can inspect it
        fastcgi_param HTTP_X_AUTH_TOKEN $http_x_auth_token;

        fastcgi_pass_request_body off;
        fastcgi_param CONTENT_LENGTH "";
    }

    location @unauthorized {
        return 401 '{"error":"Unauthorized","nginx_demo":"auth_request blocked this request — pass X-Auth-Token: secret"}';
        add_header Content-Type application/json always;
    }


    # ── g. Geo Location — /shop ───────────────────────────────────────────────
    # GeoIP2 variables are set globally (http block above).
    # Pass them as FastCGI params so Laravel sees them as request headers.
    # Laravel reads: $request->header('X-Country-Code') etc.
    # Handled in the main PHP location block below (fastcgi_param lines).


    # ── h. Split Testing — /checkout ─────────────────────────────────────────
    # $ab_variant is set per-IP by split_clients above.
    # Passed as a FastCGI param and also set as a cookie so the client
    # can be consistently served the same variant on subsequent requests.
    # Handled in the main PHP location block below.


    # ── i. Request Mirroring ──────────────────────────────────────────────────
    # Every request to / is silently duplicated to /mirror-log via POST.
    # Laravel stores the mirrored request; GET /mirror-log shows last 20.

    location / {
        mirror /mirror-internal;
        mirror_request_body on;

        try_files $uri $uri/ /index.php?$query_string;
    }

    # Internal mirror target — proxies the duplicated request back to PHP-FPM
    location = /mirror-internal {
        internal;

        proxy_pass         http://127.0.0.1/mirror-log;
        proxy_method       POST;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Original-URI    $request_uri;
        proxy_set_header   X-Mirror-Secret   "mirror-secret";  # matches DEMO_MIRROR_SECRET in .env
    }


    # ── j. PHP-FPM ────────────────────────────────────────────────────────────

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # FastCGI Cache
        fastcgi_cache          fastcgi_cache;
        fastcgi_cache_key      "$scheme$request_method$host$request_uri";
        fastcgi_cache_valid    200 10m;
        fastcgi_cache_valid    404 1m;
        fastcgi_cache_use_stale error timeout http_500 http_502 http_503 http_504 updating;
        fastcgi_no_cache       $cookie_nocache $arg_nocache;
        fastcgi_cache_bypass   $cookie_nocache $arg_nocache;
        add_header             X-Cache-Status $upstream_cache_status always;

        # GeoIP2 headers → Laravel request headers
        fastcgi_param HTTP_X_COUNTRY_CODE  $geoip2_country_code;
        fastcgi_param HTTP_X_COUNTRY_NAME  $geoip2_country_name;
        fastcgi_param HTTP_X_CITY          $geoip2_city;
        fastcgi_param HTTP_X_REGION        $geoip2_region;
        fastcgi_param HTTP_X_TIMEZONE      $geoip2_timezone;

        # Split testing header → Laravel request header + client cookie
        fastcgi_param HTTP_X_AB_VARIANT    $ab_variant;
        add_header Set-Cookie "ab_variant=$ab_variant; Path=/; SameSite=Lax" always;
    }


    # Static assets — skip PHP and cache entirely
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|woff2?|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
